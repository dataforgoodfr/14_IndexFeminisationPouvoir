version: 2

models:
  - name: stg_figure2b
    description: >
      Liste des président·es de commission à l’Assemblée Nationale
    columns:
      - name: annee_partition
        description: année de la récupération des données
        type: INTEGER
        data_tests:
          - not_null
      - name: id
        description: ID généré par hachage MD5 personne_raw_text et poste_libelle
        type: TEXT
        data_tests:
          - not_null
          - unique
      - name: personne_civilite
        description: civilité Mme ou M.
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Mme', 'M.']
      - name: personne_prenom
        description: Prénom du / de la président·es de commision
        type: TEXT
      - name: personne_nom
        description: Nom du / de la président·es de commision
        type: TEXT
      - name: genre
        description: F or M
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['F', 'M']
      - name: groupe_politique_libelle
        description: Libellé du groupe politique de la personne
        type: TEXT
      - name: poste_libelle
        description: Nom de la commision concernée à l’Assemblée Nationale
        tests:
          - not_null
        type: TEXT
      - name: zone_geographique_libelle
        description: "Circonscription dans laquelle la personne a été élue, au format Région - Département - n° circo"
        type: TEXT
        data_tests:
          - not_null
      - name: zone_geographique_type
        description: "toujours 'circonscription'"
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['circonscription']