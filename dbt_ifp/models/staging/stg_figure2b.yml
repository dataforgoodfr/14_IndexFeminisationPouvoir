version: 2

models:
  - name: stg_figure2b
    description: >
      Liste des président·es de commission à l’Assemblée Nationale
    columns:
      - name: figure
        description: nom de la figure
        type: TEXT

      - name: pouvoir_type
        description: type de pouvoir
        type: TEXT
      
      - name: institution_type
        description: "type d'institution"
        type: TEXT
        
      - name: annee_partition
        description: année de la récupération des données
        type: INTEGER
        data_tests:
          - not_null
      - name: personne_id
        description: ID généré par hachage MD5 personne_raw_text et poste_libelle
        type: TEXT
        data_tests:
          - not_null
          - unique
      - name: personne_civilite
        description: civilité Mme ou M.
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Mme', 'M.']
      - name: personne_prenom
        description: Prénom du / de la président·es de commision
        type: TEXT
      - name: personne_nom
        description: Nom du / de la président·es de commision
        type: TEXT
      - name: personne_genre
        description: F or M
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['F', 'M']
      - name: groupe_politique_libelle
        description: Libellé du groupe politique de la personne
        type: TEXT
      - name: poste_libelle
        description: Nom de la commision concernée à l’Assemblée Nationale
        tests:
          - not_null
        type: TEXT
      - name: circonscription_code
        description: "Circonscription dans laquelle la personne a été élue"
        type: TEXT
        data_tests:
          - not_null

      - name: departement_code
        description: "Code du département dans lequel la personne a été élue"
        type: TEXT
        data_tests:
          - not_null

      - name: departement_libelle
        description: "Libellé du département dans lequel la personne a été élue"
        type: TEXT
        data_tests:
          - not_null

      - name: region_libelle
        description: "Libellé de la région dans laquelle la personne a été élue"
        type: TEXT
        data_tests:
          - not_null