version: 1

models:
  - name: stg_figure3b
    description: >
      Pourcentage de femmes présidant une commission au Sénat
    columns:
      - name: figure
        description: nom de la figure
        type: TEXT

      - name: pouvoir_type
        description: type de pouvoir
        type: TEXT
      
      - name: institution_type
        description: "type d'institution"
        type: TEXT
        
      - name: annee_partition
        description: année de la récupération des données
        type: INTEGER
        data_tests:
          - not_null

      - name: personne_id
        description: ID généré par hachage MD5 personne_raw_text, personne_genre et poste_libelle
        type: TEXT
        data_tests:
          - not_null
          - unique

      - name: personne_civilite
        description: civilité Mme ou M.
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['Mme', 'M.']

      - name: personne_prenom
        description: Prénom de la personne
        type: TEXT

      - name: personne_nom
        description: Nom de la personne
        type: TEXT

      - name: personne_genre
        description: F or M
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['F', 'M']

      - name: groupe_politique_libelle
        description: Libellé du groupe politique de la personne
        type: TEXT

      - name: poste_libelle
        description: Nom de la commission présidée par la personne
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "ILIKE '%commission%'"        
        type: TEXT

      - name: source_url
        description: URL de provenance de la données
        type: TEXT