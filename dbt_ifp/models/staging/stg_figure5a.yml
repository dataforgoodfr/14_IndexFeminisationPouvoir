version: 1

models:
  - name: stg_figure5a
    description: Liste des des élu.es maires à fin 2025
    columns:
      - name: id
        description: ID de la ligne
        type: INTEGER
        data_tests:
          - not_null
          - unique
      - name: code_departement
        description: Code du département de l'élu.e maire
        type: TEXT
      - name: libelle_departement
        description: Département de l'élu.e maire
        type: TEXT
      - name: code_commune
        description: Code postal de la commune de l'élu.e maire
        type: TEXT
      - name: libelle_commune
        description: Commune de l'élu.e maire
        type: TEXT
      - name: nom_elu
        description: Nom de famille de l'élu.e maire
        type: TEXT
      - name: prenom_elu
        description: Prénom de l'élu.e maire
        type: TEXT
      - name: genre_elu
        description: Genre de l'élu.e maire 
        type: TEXT
        data_tests:
          - not_null  
          - accepted_values:
              arguments: 
                values: ['M','F'] 
      - name: date_naissance
        type: DATE   
      - name: code_CSP
        type: TEXT
      - name: libelle_CSP
        type: TEXT
      - name: date_debut_mandat
        type: DATE
        description: Date de début du mandat de l'élu.e maire
      - name: date_debut_fonction
        type: DATE
      - name: source_url
        type: TEXT
