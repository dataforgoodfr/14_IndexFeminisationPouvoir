version: 2

models:
  - name: stg_figure7a
    description: Liste des hommes et des femmes présidant une région par année ( à partir de 2026)
    columns:
      - name: figure
        description: nom de la figure
        type: TEXT

      - name: pouvoir_type
        description: type de pouvoir
        type: TEXT
      
      - name: institution_type
        description: "type d'institution"
        type: TEXT
        
      - name: annee_partition
        description: année de la récupération des données
        type: INTEGER
        data_tests:
          - not_null
      - name: personne_id
        description: Identifiant
        type: TEXT
        data_tests:
          - not_null
          - unique
      - name: region_code
        description: "Code de la région"
        type: TEXT
      - name: region_libelle
        description: "Libellé de la région"
        type: TEXT
      - name: departement_code
        description: "Code de la section départementale"
        type: TEXT
      - name: departement_libelle
        description: "Libellé de la section départementale"
        type: TEXT
      - name: personne_nom
        description: "Nom de l'élu"
        type: TEXT
      - name: personne_prenom
        description: "Prénom de l'élu"
        type: TEXT
      - name: personne_genre
        description: genre (F or M)
        type: STRING
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['F', 'M']
        type: TEXT
      - name: date_naissance
        description: Date de naissance
        type: DATE
      - name: csp_code
        description: 'Code de la catégorie socio-professionnelle. Professions et Catégories Socioprofessionnelles'
        type: INTEGER
      - name: csp_libelle
        description: 'Libellé de la catégorie socio-professionnelle'
        type: TEXT
      - name: date_debut_mandat
        description: 'Date de début du mandat'
        type: DATE
      - name: poste_libelle
        description: 'Libellé de la fonction'
        type: TEXT
      - name: date_debut_fonction
        description: 'Date de début de la fonction'
        type: DATE
      - name: source_url
        description: URL de provenance de la donnée
        type: TEXT
