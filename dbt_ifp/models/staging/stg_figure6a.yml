models:
  - name: stg_figure6a
    description: "Liste des conseillers·ères départementaux·ales récupérée par scraping"
    columns:
      - name: figure
        description: nom de la figure
        type: TEXT

      - name: pouvoir_type
        description: type de pouvoir
        type: TEXT
      
      - name: institution_type
        description: "type d'institution"
        type: TEXT
        
      - name: annee_partition
        data_type: integer
        description: année de la récupération des données
        data_tests:
          - not_null

      - name: personne_id
        data_type: text
        description: "L’id de la ligne"
        data_tests:
          - unique
          - not_null

      - name: departement_code
        data_type: text
        description: "Le numéro du département"
        data_tests:
          - not_null

      - name: departement_libelle
        data_type: text
        description: "Le nom du département"
        data_tests:
          - not_null

      - name: canton_code
        data_type: text
        description: "Le code du canton"
        data_tests:
          - not_null

      - name: canton_libelle
        data_type: text
        description: "Le nom du canton"
        data_tests:
          - not_null

      - name: personne_nom
        data_type: text
        description: "Le nom de l’élu"
        data_tests:
          - not_null

      - name: personne_prenom
        data_type: text
        description: "Le prénom de l’élu·e"
        data_tests:
          - not_null

      - name: personne_genre
        data_type: text
        description: "Le genre de l’élu·e ('M' ou 'F')"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 'M', 'F' ]

      - name: date_naissance
        data_type: date
        description: "La date de naissance de l’élu·e"
        data_tests:
          - not_null

      - name: csp_code
        data_type: text
        description: "Le code de la catégorie socio-professionnelle de l’élu·e"
        data_tests:
          - not_null

      - name: csp_libelle
        data_type: text
        description: "Le nom de la catégorie socio-profesionnelle de l’élu·e"
        data_tests:
          - not_null

      - name: date_debut_mandat
        data_type: date
        description: "La date de début du mandat de l’élu·e"
        data_tests:
          - not_null

      - name: poste_libelle
        data_type: text
        description: "Le nom de la fonction de l’élu·e au sein du conseil départemental. Peut être nul"

      - name: date_debut_fonction
        data_type: date
        description: "La date de début de la fonction de l’élu·e au sein du conseil départemental. Peut être nul "

      - name: source_url
        data_type: text
        description: "URL de provenance de la donnée"