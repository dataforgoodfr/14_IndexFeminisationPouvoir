version: 2

models:
  - name: stg_figure6b
    description: >
      Liste des directeurs et directrices de cabinet d'un-e président-e de département (à partir de 2026)
    columns:
      - name: figure
        description: nom de la figure
        type: TEXT

      - name: pouvoir_type
        description: type de pouvoir
        type: TEXT
      
      - name: institution_type
        description: "type d'institution"
        type: TEXT
        
      - name: annee_partition
        description: année de la récupération des données
        type: INTEGER
        data_tests:
          - not_null
      - name: personne_id
        description: ID généré par hachage MD5 personne_raw_text et zone_geographique_libelle
        type: TEXT
        data_tests:
          - not_null
          - unique
      - name: personne_civilite
        description: civilité Mme ou M.
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['Mme', 'M.']
      - name: personne_prenom
        description: Prénom du directeur de cabinet
        type: TEXT
      - name: personne_nom
        description: Nom du directeur de cabinet
        type: TEXT
      - name: personne_genre
        description: F or M
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['F', 'M']
      - name: groupe_politique_libelle
        description: Libellé du groupe politique de la personne
        type: TEXT
      - name: poste_libelle
        description: Directrice de cabinet ou Directeur de cabinet
        tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['Directrice de cabinet', 'Directeur de cabinet']        
        type: TEXT
      - name: prefecture_libelle
        description: "Prefecture dans laquelle la personne est élue."
        type: TEXT
        data_tests:
          - not_null   
          
      - name: source_url
        description: URL de provenance de la données
        type: TEXT