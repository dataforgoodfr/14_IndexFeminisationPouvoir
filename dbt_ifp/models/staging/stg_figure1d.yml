version: 2

models:
  - name: stg_figure1d
    description: >
      Liste des membres du cabinet du Premier Ministre
    columns:
      - name: annee_partition
        description: année de la récupération des données
        type: INTEGER
        data_tests:
          - not_null
      - name: id
        description: ID généré par hachage MD5 personne_raw_text et poste_libelle
        type: TEXT
        data_tests:
          - not_null
          - unique
      - name: personne_civilite
        description: civilité Mme ou M.
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['Mme', 'M.']
      - name: personne_prenom
        description: Prénom de la ou du membre du cabinet
        type: TEXT
      - name: personne_nom
        description: Nom de la ou du membre du cabinet
        type: TEXT
      - name: genre
        description: F or M
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['F', 'M']
      - name: poste_libelle
        description: Nom du poste
        tests:
          - not_null
        type: TEXT
      - name: zone_geographique_libelle
        description: Nom du cabinet ou du pôle
        type: TEXT
        data_tests:
          - not_null 
      - name: zone_geographique_type
        description: toujours "gouvernement"
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['gouvernement']   
      - name: source_url
        description: URL de provenance de la données
        type: TEXT