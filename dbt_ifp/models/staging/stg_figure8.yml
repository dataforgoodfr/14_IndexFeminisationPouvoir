version: 2

models:
  - name: stg_figure8
    description: >
      Liste des hommes et des femmes présidant une haute juridiction
    columns:
      - name: annee_partition
        description: année de la récupération des données
        type: INTEGER
        data_tests:
          - not_null
      - name: id
        description: ID généré par hachage MD5 personne_raw_text et zone_geographique_libelle
        type: TEXT
        data_tests:
          - not_null
          - unique
      - name: personne_civilite
        description: civilité Mme ou M.
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['Mme', 'M.']
      - name: personne_prenom
        description: Prénom de la personne qui préside la haute juridiction
        type: TEXT
      - name: personne_nom
        description: Nom de la personne qui préside la haute juridiction
        type: TEXT
      - name: genre 
        description: F or M
        type: TEXT
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['F', 'M']
      - name: poste_libelle
        description: Intitulé du poste de la personne qui préside la haute juridiction     
        type: TEXT
      - name: zone_geographique_libelle
        description: Lieu d'exercice de la personne qui préside la haute juridiction
        type: TEXT 
      - name: zone_geographique_type
        description: Type de pouvoir - Toujours "haute juridiction"
        type: TEXT  
      - name: source_url
        description: URL de provenance de la donnée
        type: TEXT